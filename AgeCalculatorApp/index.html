<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Age Calculator</title>
    <link rel="shortcut icon" href="images/favicon-32x32.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <form class="date-form">
        <div class="inputs">
          <div class="input-group">
            <label for="day">DAY</label>
            <input type="number" id="day" placeholder="DD" />
            <small class="error-message" id="day-error"></small>
          </div>

          <div class="input-group">
            <label for="month">MONTH</label>
            <input type="number" id="month" placeholder="MM" />
            <small class="error-message" id="month-error"></small>
          </div>

          <div class="input-group">
            <label for="year">YEAR</label>
            <input type="number" id="year" placeholder="YYYY" />
            <small class="error-message" id="year-error"></small>
          </div>
        </div>

        <div class="divider">
          <button type="submit" class="submit-btn">
            <img src="images/icon-arrow.svg" alt="arrow" />
          </button>
        </div>
      </form>

      <section class="result">
        <h1><span id="years">--</span> years</h1>
        <h1><span id="months">--</span> months</h1>
        <h1><span id="days">--</span> days</h1>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
