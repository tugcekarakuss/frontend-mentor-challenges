<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <title>Frontend Mentor | Interactive rating component</title>
    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Overpass:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <!-- Rating state start -->
      <form class="card" id="rate-card">
        <div class="card__icon">
          <img src="images/icon-star.svg" alt="Star icon" />
        </div>
        <h1 class="card__title">How did we do?</h1>
        <p class="card__description">
          Please let us know how we did with your support request. All feedback
          is appreciated to help us improve our offering!
        </p>
        <div class="card__ratings" role="group" aria-label="Rating from 1 to 5">
          <button
            type="button"
            class="card__rating"
            value="1"
            aria-label="Rate 1 out of 5"
            aria-pressed="false"
          >
            1
          </button>
          <button
            type="button"
            class="card__rating"
            value="2"
            aria-label="Rate 2 out of 5"
            aria-pressed="false"
          >
            2
          </button>
          <button
            type="button"
            class="card__rating"
            value="3"
            aria-label="Rate 3 out of 5"
            aria-pressed="false"
          >
            3
          </button>
          <button
            type="button"
            class="card__rating"
            value="4"
            aria-label="Rate 4 out of 5"
            aria-pressed="false"
          >
            4
          </button>
          <button
            type="button"
            class="card__rating"
            value="5"
            aria-label="Rate 5 out of 5"
            aria-pressed="false"
          >
            5
          </button>
        </div>
        <button type="submit" class="card__submit">Submit</button>
        <!-- Rating state end -->
      </form>

      <!-- Thank you state start -->
      <section class="card hidden" id="thankyou-card" aria-live="polite" aria-hidden="true">
        <img
          class="card__illustration"
          src="images/illustration-thank-you.svg"
          alt="Thank you illustration"
        />
        <p class="card__selected" aria-live="polite">
          You selected <span id="rating"></span> out of 5
        </p>
        <h2 class="card__title">Thank you!</h2>
        <p class="card__description">
          We appreciate you taking the time to give a rating. If you ever need
          more support, don’t hesitate to get in touch!
        </p>
      </section>
      <!-- Thank you state end -->
    </main>
    <script src="script.js"></script>
  </body>
</html>
